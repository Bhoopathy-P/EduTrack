# Server Configuration
server.port=8080

# Spring DataSource (MySQL Database Config)
spring.datasource.url=jdbc:mysql://localhost:3306/edutrack_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations
edutrack.jwt.secret=9a4f2c8d3b7a1e5f8c2d6b3a9e4f2c8d3b7a1e5f8c2d6b3a9e4f2c8d3b7a1e5f
edutrack.jwt.expirationMs=86400000

# Logging Levels
logging.level.org.springframework.security=INFO
logging.level.com.edutrack=DEBUG
